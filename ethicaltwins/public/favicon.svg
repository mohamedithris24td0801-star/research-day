<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- DNA Helix Design for Ethical Twins Favicon -->
  <defs>
    <linearGradient id="dnaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Left Helix Strand -->
  <path d="M 35 20 Q 40 35, 35 50 Q 30 65, 35 80" 
        stroke="url(#dnaGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Right Helix Strand -->
  <path d="M 65 20 Q 60 35, 65 50 Q 70 65, 65 80" 
        stroke="url(#dnaGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Connecting Base Pairs -->
  <line x1="35" y1="25" x2="65" y2="35" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  <line x1="35" y1="40" x2="65" y2="50" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  <line x1="35" y1="60" x2="65" y2="60" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  <line x1="35" y1="75" x2="65" y2="65" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
</svg>